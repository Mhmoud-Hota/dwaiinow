name: dawai_app
description: A new Flutter project for My Medicine app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cloud_firestore: ^6.1.2
  dio: ^5.9.2
  equatable: ^2.0.8

  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_screenutil: ^5.9.0
  flutter_secure_storage: ^10.0.0
  geolocator: ^14.0.2
  get_it: ^9.2.0
  go_router: ^17.0.1
  google_fonts: ^6.1.0
  image_picker: ^1.2.1
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/dwainow.png
    - assets/images/dwainowicone.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dwainow.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/dwainow.png"